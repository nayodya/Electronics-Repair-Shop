apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ers-backend
  labels:
    app: api
spec:
  type: NodePort
  selector:
    app: api
  ports:
  - name: http
    port: 5062
    targetPort: 5062
    nodePort: 30062
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    nodePort: 30443
    protocol: TCP
