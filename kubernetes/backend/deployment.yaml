apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ers-backend
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: ersbackend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5062
